[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# exact route for monthly metrics
[[redirects]]
  from = "/api/metrics/monthly"
  to   = "/.netlify/functions/metrics-monthly"
  status = 200
  
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

  # Scheduled function to update product costs hourly
[functions."scheduled-update-product-costs"]
  schedule = "0 * * * *"

  # Scheduled function to update shipping costs hourly
[functions."scheduled-update-shipping-costs"]
  schedule = "0 * * * *"

  # Scheduled function to update employee salaries hourly
[functions."scheduled-update-employee-salaries"]
  schedule = "0 * * * *"

  # Scheduled function to process and send booking reminders (every 15 min)
[functions."scheduled-process-reminders"]
  schedule = "*/15 * * * *"

  # Scheduled function to retry failed reminder sends (hourly)
[functions."retry-failed-reminders"]
  schedule = "0 * * * *"

  # Scheduled function to sync Stripe SMS usage (hourly)
[functions."sync-stripe-sms-usage"]
  schedule = "0 * * * *"

  # Scheduled function to sync Stripe AI usage (hourly)
[functions."sync-stripe-ai-usage"]
  schedule = "0 * * * *"
